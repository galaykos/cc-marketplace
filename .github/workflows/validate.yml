name: validate

on:
  push:
    branches: [master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate marketplace structure
        run: bash scripts/validate.sh
      - name: Check plugin version bumps
        if: github.event_name == 'pull_request'
        run: bash scripts/check-version-bumps.sh "${{ github.event.pull_request.base.sha }}"
      - name: Chassis regenerate-and-diff (enforcing)
        run: bash scripts/generate.sh --check
      - name: Template engine smoke tests
        run: bash scripts/smoke/template-engine-tests.sh
      - name: Chassis template smoke tests
        run: bash scripts/smoke/chassis-template-tests.sh
      - name: Reminder-hook guard smoke tests
        run: bash scripts/smoke/hook-guard-tests.sh
      - name: Authoring-guard smoke tests
        run: bash scripts/smoke/guard-tests.sh
      - name: Hook syntax smoke tests
        run: bash scripts/smoke/hook-syntax-tests.sh
      - name: Rules overlap-gate smoke tests
        run: bash scripts/smoke/rules-overlap-tests.sh
      - name: Route marker smoke tests
        run: bash scripts/smoke/route-marker-tests.sh
      - name: Behavioral-verification smoke tests
        run: bash scripts/smoke/behavioral-verification-tests.sh
      # scripts/smoke/canary.sh is intentionally NOT a CI step: its own header
      # declares it "NOT a CI gate (needs a live model)". It reads
      # $HOME/.claude/plugins/cache (absent in CI), needs a delegated model round
      # to echo its proof token, and exits 1 with no args. It stays a local
      # authoring harness, run by hand.

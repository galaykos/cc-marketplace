<!doctype html>
<html><head><meta charset="utf-8"><title>Sign up — step 2</title></head>
<body>
  <h1>Complete your profile (2/2)</h1>
  <form id="profile" action="https://example.com/register/profile" method="post">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" required placeholder="handle">
    <label for="fullname">Full name</label>
    <input id="fullname" name="fullname" type="text" required>
    <label for="age">Age</label>
    <input id="age" name="age" type="number">
    <button type="submit">Finish</button>
  </form>
</body></html>

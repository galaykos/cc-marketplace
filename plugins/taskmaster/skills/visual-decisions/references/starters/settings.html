<!--
  Starter: Org settings — tabbed sections (profile / notifications /
  integrations). Suits axis passes like tabs-vs-single-scroll or field
  density. The tab strip is persistent chrome (no data-state) and stays
  visible across states. Copy the whole fragment into a frame's
  `.vd-content` — see ../shell-authoring.md.
-->
<div class="vd-tabs">
  <a class="vd-tab" href="#">Profile</a>
  <a class="vd-tab" href="#" aria-current="page">Notifications</a>
  <a class="vd-tab" href="#">Integrations</a>
</div>

<div data-state="populated">
  <div class="vd-form">
    <div class="vd-row"><span>Product updates</span><span class="vd-switch vd-on" aria-label="Product updates"></span></div>
    <div class="vd-row"><span>Security alerts</span><span class="vd-switch vd-on" aria-label="Security alerts"></span></div>
    <div class="vd-row"><span>Weekly digest</span><span class="vd-switch" aria-label="Weekly digest"></span></div>
    <div><button type="button" class="vd-btn vd-primary">Save preferences</button></div>
  </div>
</div>

<div data-state="empty">
  <div class="vd-empty">
    No notification channels configured yet.
    <div><button type="button" class="vd-btn vd-primary">Add a channel</button></div>
  </div>
</div>

<div data-state="error">
  <div class="vd-alert vd-err">
    Couldn't save settings — the request timed out.
    <div><button type="button" class="vd-btn">Retry</button></div>
  </div>
</div>
